service: doggy-connect-pets

provider:
  name: aws
  runtime: python3.12
  region: us-east-1
  environment:
    PETS_TABLE: ${self:service}-${sls:stage}-pets
  iam:
    role:
      statements:
        - Effect: Allow
          Action:
            - dynamodb:PutItem
            - dynamodb:GetItem
            - dynamodb:UpdateItem
            - dynamodb:DeleteItem
            - dynamodb:Scan
            - dynamodb:Query
          Resource:
            - !GetAtt PetsTable.Arn

plugins:
  - serverless-offline
  - serverless-dynamodb
  - serverless-python-requirements

custom:
  pythonRequirements:
    dockerizePip: true
    useStaticCache: false
    useDownloadCache: false
  serverless-offline:
    noPrependStageInUrl: true
  serverless-dynamodb:
    stages:
      - dev
    start:
      port: 8000
      inMemory: true
      migrate: true
      seed: true
      convertEmptyValues: true
      noStart: true

    seed:
      local:
        sources:
          - table: petsTable

functions:
  api:
    handler: handler.handler
    events:
      - http:
          path: /
          method: ANY
          cors: true
      - http:
          path: /{proxy+}
          method: ANY
          cors: true

resources:
  Resources:
    PetsTable:
      Type: AWS::DynamoDB::Table
      Properties:
        TableName: ${self:provider.environment.PETS_TABLE}
        BillingMode: PAY_PER_REQUEST
        AttributeDefinitions:
          - AttributeName: pet_id
            AttributeType: S
        KeySchema:
          - AttributeName: pet_id
            KeyType: HASH